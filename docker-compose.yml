services:
  postgres:
    image: postgres:17.4
    container_name: sakany-postgres
    env_file:
      - secrets.properties
    ports:
      - "5454:5432"
    volumes:
      - sakany_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakany -d sakany"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sakany-pgadmin
    env_file:
      - secrets.properties
    ports:
      - "5433:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sakany_postgres_data:
