spring.config.import=file:./secrets.properties

spring.application.name=Sakany

spring.datasource.url=jdbc:postgresql://localhost:5454/sakany
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.tracing.sampling.probability=1.0
#management.otlp.tracing.endpoint=http://localhost:4317/v1/tracey

auth.secret-key=sakany-super-secret-signing-key-change-in-production-2026-04-15
auth.access-token-expiration=3600000
auth.refresh-token-expiration=604800000